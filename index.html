<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Love</title>

  <style>
    :root {
      --bg1: #fff6f0;
      --bg2: #ffe4e1;
      --paper: #fffaf5;
      --ink: #5b3b3b;
      --accent: #d97b93;
      --accent-dark: #b85f79;
      --envelope: #f3cfd8;
      --envelope-dark: #e7b6c3;
      --shadow: rgba(103, 63, 76, 0.18);

      --pink-box: #f8d7e3;
      --gold-box: #f7e6b5;
      --lav-box: #e7dcfa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.6), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 24px;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.45) 0 6px, transparent 7px),
        radial-gradient(circle at 75% 25%, rgba(255,255,255,0.3) 0 5px, transparent 6px),
        radial-gradient(circle at 30% 75%, rgba(255,255,255,0.25) 0 7px, transparent 8px),
        radial-gradient(circle at 85% 80%, rgba(255,255,255,0.35) 0 5px, transparent 6px);
      background-size: 180px 180px;
      opacity: 0.7;
    }

    .scene {
      width: 100%;
      max-width: 760px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .envelope-wrapper {
      position: relative;
      width: min(92vw, 420px);
      height: 290px;
      cursor: pointer;
      transition: transform 0.35s ease;
    }

    .envelope-wrapper:hover {
      transform: translateY(-4px);
    }

    .envelope-wrapper.opened {
      cursor: default;
    }

    .hint {
      position: absolute;
      top: -42px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.04em;
      color: rgba(91, 59, 59, 0.75);
      transition: opacity 0.3s ease;
    }

    .envelope-wrapper.opened .hint {
      opacity: 0;
    }

    .envelope {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 220px;
      filter: drop-shadow(0 18px 30px var(--shadow));
    }

    .envelope-back {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #f7d9e2, var(--envelope));
      border-radius: 0 0 18px 18px;
      overflow: hidden;
    }

    .envelope-front {
      position: absolute;
      inset: 0;
      z-index: 4;
    }

    .envelope-front::before {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 50%;
      height: 100%;
      background: var(--envelope-dark);
      clip-path: polygon(0 0, 100% 100%, 0 100%);
      border-bottom-left-radius: 18px;
    }

    .envelope-front::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      width: 50%;
      height: 100%;
      background: #edc0cc;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      border-bottom-right-radius: 18px;
    }

    .envelope-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 62%;
      background: #f0c7d2;
      clip-path: polygon(0 100%, 50% 35%, 100% 100%);
      z-index: 5;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 58%;
      background: linear-gradient(180deg, #f7dce4, #efc3cf);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 0.9s cubic-bezier(.2,.8,.2,1);
      z-index: 6;
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
    }

    .seal {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffb6c7, #d9708c);
      z-index: 7;
      display: grid;
      place-items: center;
      box-shadow: 0 6px 18px rgba(160, 74, 99, 0.25);
      transition: opacity 0.35s ease;
      color: white;
      font-size: 20px;
    }

    .opened .flap {
      transform: rotateX(180deg);
      z-index: 1;
    }

    .opened .seal {
      opacity: 0;
    }

    .letter {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(120px);
      width: 88%;
      max-width: 370px;
      min-height: 410px;
      background: linear-gradient(180deg, #fffdfb, var(--paper));
      border-radius: 18px;
      box-shadow:
        0 18px 40px rgba(88, 51, 62, 0.18),
        inset 0 0 0 1px rgba(204, 170, 170, 0.18);
      padding: 28px 22px 22px;
      z-index: 2;
      opacity: 0;
      transition:
        transform 1s cubic-bezier(.2,.8,.2,1),
        opacity 0.7s ease;
      overflow: hidden;
    }

    .opened .letter {
      transform: translateX(-50%) translateY(-120px);
      opacity: 1;
      z-index: 3;
    }

    .paper-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.85), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.25), transparent 45%);
      pointer-events: none;
    }

    .letter-content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .letter.show-text .letter-content {
      opacity: 1;
    }

    .title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(26px, 4vw, 34px);
      margin: 0 0 16px;
      color: var(--accent-dark);
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      opacity: 0.72;
      margin-bottom: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .message {
      font-size: 17px;
      line-height: 1.9;
      min-height: 155px;
      white-space: normal;
    }

    .word {
      opacity: 0;
      display: inline-block;
      transform: translateY(8px);
      animation: wordFade 0.45s forwards;
      margin-right: 0.28em;
    }

    @keyframes wordFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .signature {
      margin-top: 18px;
      font-size: 15px;
      text-align: right;
      color: rgba(91, 59, 59, 0.82);
    }

    .boxes {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .box {
      border: none;
      border-radius: 16px;
      padding: 14px 14px;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
      box-shadow: 0 10px 20px rgba(111, 76, 87, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .box:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(111, 76, 87, 0.12);
    }

    .box-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .box-hint {
      font-size: 12px;
      opacity: 0.7;
    }

    .box-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, margin-top 0.35s ease, opacity 0.35s ease;
      opacity: 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .box.open .box-content {
      max-height: 120px;
      margin-top: 10px;
      opacity: 1;
    }

    .box.reason {
      background: var(--pink-box);
    }

    .box.joke {
      background: var(--gold-box);
    }

    .box.ps {
      background: var(--lav-box);
    }

    .floating-heart {
      position: fixed;
      bottom: -20px;
      font-size: 18px;
      opacity: 0.75;
      pointer-events: none;
      animation: floatUp linear forwards;
      z-index: 0;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(1);
        opacity: 0.75;
      }
      to {
        transform: translateY(-110vh) scale(1.35);
        opacity: 0;
      }
    }

    @media (max-width: 520px) {
      .envelope-wrapper {
        height: 300px;
      }

      .letter {
        min-height: 440px;
        padding: 24px 18px 18px;
      }

      .message {
        font-size: 16px;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="envelope-wrapper" id="envelopeWrapper">
      <div class="hint">tap the envelope 💌</div>

      <div class="letter" id="letter">
        <div class="paper-glow"></div>

        <div class="letter-content">
          <h1 class="title">Two Months With You</h1>
          <div class="subtitle">a little note for my favorite person</div>

          <div class="message" id="message"></div>

          <div class="signature">
            Love,<br />
            your genius boyfriend :)
          </div>

          <div class="boxes">
            <button class="box reason" type="button">
              <div class="box-title">A reason I like you</div>
              <div class="box-hint">tap to open</div>
              <div class="box-content">
                I like how sweet and lovable you are. You make things feel softer,
                warmer, and more special just by being you.
              </div>
            </button>

            <button class="box joke" type="button">
              <div class="box-title">An inside joke</div>
              <div class="box-hint">tap to open</div>
              <div class="box-content">
                You already know this is where our little chaotic funny moment goes.
                Put the one that instantly makes her laugh when she reads it.
              </div>
            </button>

            <button class="box ps" type="button">
              <div class="box-title">P.S.</div>
              <div class="box-hint">tap to open</div>
              <div class="box-content">
                Thank you for making these last two months feel beautiful. I’m really,
                really happy it’s been you.
              </div>
            </button>
          </div>
        </div>
      </div>

      <div class="envelope">
        <div class="envelope-back"></div>
        <div class="flap"></div>
        <div class="seal">♥</div>
        <div class="envelope-front"></div>
        <div class="envelope-bottom"></div>
      </div>
    </div>
  </div>

  <script>
    const envelopeWrapper = document.getElementById("envelopeWrapper");
    const letter = document.getElementById("letter");
    const message = document.getElementById("message");
    const boxes = document.querySelectorAll(".box");

    const fullMessage = `
      My love, these two months with you have felt so sweet and so special.
      You’ve brought so much warmth, laughter, and softness into my life,
      and I really wanted to make you something that felt personal,
      because you deserve more than something random or ordinary.
      Thank you for being you, and for making my life better just by being in it.
    `;

    let hasOpened = false;

    function typeWords(text, element) {
      const words = text.trim().split(/\s+/);
      element.innerHTML = "";

      words.forEach((word, index) => {
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = word;
        span.style.animationDelay = `${index * 0.08}s`;
        element.appendChild(span);
      });
    }

    function createFloatingHearts() {
      const symbols = ["♥", "♡", "💕"];
      const heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 4 + Math.random() * 3 + "s";
      heart.style.fontSize = 14 + Math.random() * 14 + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    let heartInterval = null;

    envelopeWrapper.addEventListener("click", () => {
      if (hasOpened) return;
      hasOpened = true;

      envelopeWrapper.classList.add("opened");

      setTimeout(() => {
        letter.classList.add("show-text");
        typeWords(fullMessage, message);
      }, 950);

      heartInterval = setInterval(createFloatingHearts, 550);

      setTimeout(() => {
        clearInterval(heartInterval);
      }, 7000);
    });

    boxes.forEach((box) => {
      box.addEventListener("click", (e) => {
        e.stopPropagation();
        box.classList.toggle("open");
      });
    });
  </script>
</body>
</html>
