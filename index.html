<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two Months With You</title>

  <style>
    :root {
      --bg1: #f7ece7;
      --bg2: #f3e3dd;
      --bg3: #efe0db;

      --ink: #5d4742;
      --ink-soft: #8b6e67;

      --paper: #fff8ee;
      --paper-mid: #fdf3e4;
      --paper-edge: #f0e2cf;
      --paper-line: rgba(150, 110, 92, 0.11);

      --envelope: #fffdfa;
      --envelope-2: #f7f2eb;
      --envelope-3: #efe8df;
      --envelope-shadow: rgba(110, 88, 82, 0.16);

      --flap: #f5efe7;
      --flap-dark: #ece3d8;

      --seal: #b90f16;
      --seal-dark: #7f0910;
      --seal-highlight: #ef4a4f;
      --seal-light: #ff7a7d;

      --reason: #f1d6de;
      --ps: #ddd3ee;

      --shadow-soft: rgba(96, 67, 67, 0.10);
      --shadow-deep: rgba(96, 67, 67, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.85), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.6), transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 55%, var(--bg3));
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.78;
      background-image:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.24) 0 6px, transparent 7px),
        radial-gradient(circle at 42% 28%, rgba(255,255,255,0.18) 0 5px, transparent 6px),
        radial-gradient(circle at 58% 28%, rgba(255,255,255,0.18) 0 5px, transparent 6px),
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.14) 0 6px, transparent 7px),
        radial-gradient(circle at 44% 72%, rgba(255,255,255,0.12) 0 5px, transparent 6px),
        radial-gradient(circle at 56% 72%, rgba(255,255,255,0.12) 0 5px, transparent 6px),
        radial-gradient(circle at 50% 92%, rgba(255,255,255,0.16) 0 6px, transparent 7px);
      background-repeat: no-repeat;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      padding: 32px 16px 72px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: padding-top 0.6s ease, padding-bottom 0.6s ease;
    }

    .page.open {
      align-items: flex-start;
      padding-top: 56px;
      padding-bottom: 220px;
    }

    .scene {
      width: 100%;
      max-width: 760px;
      display: flex;
      justify-content: center;
      position: relative;
    }

    .envelope-wrapper {
      position: relative;
      width: min(92vw, 430px);
      height: 300px;
      transition: height 0.65s ease;
    }

    .page.open .envelope-wrapper {
      height: 1000px;
    }

    .hint {
      position: absolute;
      top: -34px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.06em;
      color: rgba(95, 70, 64, 0.72);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .page.open .hint {
      opacity: 0;
      transform: translateY(-6px);
    }

    .envelope {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      height: 230px;
      filter: drop-shadow(0 20px 34px var(--envelope-shadow));
      z-index: 2;
    }

    .envelope-back {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, var(--envelope), var(--envelope-2)),
        repeating-linear-gradient(
          90deg,
          rgba(130, 110, 95, 0.018) 0px,
          rgba(130, 110, 95, 0.018) 1px,
          transparent 1px,
          transparent 4px
        );
      border-radius: 0 0 22px 22px;
      overflow: hidden;
      box-shadow:
        inset 0 0 0 1px rgba(219, 208, 193, 0.8),
        inset 0 8px 16px rgba(255,255,255,0.5),
        0 12px 28px rgba(120, 92, 92, 0.07);
    }

    .envelope-front {
      position: absolute;
      inset: 0;
      z-index: 4;
    }

    .envelope-front::before {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(135deg, #fffdf9 0%, #f4ede4 100%);
      clip-path: polygon(0 0, 100% 100%, 0 100%);
      border-bottom-left-radius: 22px;
      box-shadow: inset -10px 0 18px rgba(80, 60, 55, 0.03);
    }

    .envelope-front::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(225deg, #fffdf9 0%, #f3ece2 100%);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      border-bottom-right-radius: 22px;
      box-shadow: inset 10px 0 18px rgba(80, 60, 55, 0.03);
    }

    .envelope-bottom {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 62%;
      background: linear-gradient(180deg, #fefcf8, #f2eadf);
      clip-path: polygon(0 100%, 50% 34%, 100% 100%);
      z-index: 5;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      box-shadow:
        inset 0 -1px 0 rgba(220, 208, 191, 0.8),
        inset 0 10px 16px rgba(255,255,255,0.38);
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 58%;
      background:
        linear-gradient(180deg, var(--flap), var(--flap-dark)),
        repeating-linear-gradient(
          90deg,
          rgba(130, 110, 95, 0.015) 0px,
          rgba(130, 110, 95, 0.015) 1px,
          transparent 1px,
          transparent 4px
        );
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 0.95s cubic-bezier(.2,.82,.2,1);
      z-index: 7;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.75),
        0 1px 0 rgba(180, 165, 145, 0.35);
    }

    .page.open .flap {
      transform: rotateX(180deg);
      z-index: 1;
    }

    .seal {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 25% 22%, rgba(255,255,255,0.22) 0 8%, transparent 9%),
        radial-gradient(circle at 70% 74%, rgba(60,0,0,0.22) 0 18%, transparent 19%),
        radial-gradient(circle at 38% 36%, rgba(255,125,125,0.28) 0 10%, transparent 11%),
        repeating-radial-gradient(
          circle at 50% 50%,
          rgba(255,255,255,0.025) 0 2px,
          rgba(0,0,0,0.03) 2px 3px,
          transparent 3px 6px
        ),
        linear-gradient(145deg, var(--seal-light) 0%, var(--seal) 48%, var(--seal-dark) 100%);
      box-shadow:
        inset -7px -9px 14px rgba(60, 0, 0, 0.34),
        inset 6px 8px 12px rgba(255,255,255,0.18),
        0 10px 18px rgba(120, 20, 20, 0.24);
      z-index: 8;
      transition: opacity 0.35s ease, transform 0.35s ease;
      overflow: hidden;
    }
    
    .seal::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 18px;
      width: 22px;
      height: 22px;
      background: linear-gradient(180deg, #ffdede 0%, #fff1f1 40%, #f4b0b4 100%);
      transform: translateX(-50%) rotate(45deg);
      border-radius: 3px 3px 5px 3px;
      box-shadow:
        inset 0 -2px 4px rgba(160, 50, 55, 0.16),
        0 1px 1px rgba(255,255,255,0.14);
    }
    
    .seal::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 12px;
      width: 22px;
      height: 14px;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 30% 50%, #fff1f1 0 58%, transparent 59%),
        radial-gradient(circle at 70% 50%, #fff1f1 0 58%, transparent 59%);
      background-size: 14px 14px, 14px 14px;
      background-repeat: no-repeat;
      background-position: left center, right center;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.08));
    }

    .seal::before {
      left: 19px;
      transform: rotate(-45deg);
      transform-origin: bottom right;
    }

    .seal::after {
      left: 25px;
      transform: rotate(45deg);
      transform-origin: bottom left;
    }

    .page.open .seal {
      opacity: 0;
      transform: translateX(-50%) scale(0.85);
    }

    .letter {
      position: absolute;
      left: 50%;
      top: 72px;
      transform: translateX(-50%) translateY(180px);
      width: 88%;
      max-width: 378px;
      min-height: 510px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.5), transparent 52px),
        repeating-linear-gradient(
          90deg,
          rgba(145, 115, 92, 0.018) 0px,
          rgba(145, 115, 92, 0.018) 1px,
          transparent 1px,
          transparent 5px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(145, 115, 92, 0.012) 0px,
          rgba(145, 115, 92, 0.012) 1px,
          transparent 1px,
          transparent 6px
        ),
        linear-gradient(180deg, var(--paper), var(--paper-mid) 58%, var(--paper-edge));
      border-radius: 20px;
      box-shadow:
        0 28px 54px var(--shadow-deep),
        0 10px 22px var(--shadow-soft),
        inset 0 0 0 1px rgba(214, 197, 179, 0.68),
        inset 0 -14px 24px rgba(180, 145, 120, 0.05);
      opacity: 0;
      z-index: 3;
      transition:
        transform 1s cubic-bezier(.2,.82,.2,1),
        opacity 0.65s ease;
      overflow: hidden;
      cursor: pointer;
    }

    .page.open .letter {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .paper-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(
          90deg,
          rgba(195, 160, 130, 0.12) 0,
          transparent 20px,
          transparent calc(100% - 20px),
          rgba(195, 160, 130, 0.12) 100%
        ),
        radial-gradient(circle at top center, rgba(255,255,255,0.62), transparent 24%),
        linear-gradient(180deg, transparent, rgba(180, 140, 110, 0.045));
    }

    .paper-ornament-left,
    .paper-ornament-right {
      position: absolute;
      top: 24px;
      bottom: 24px;
      width: 18px;
      pointer-events: none;
      opacity: 0.28;
    }

    .paper-ornament-left {
      left: 10px;
      background:
        radial-gradient(circle at 50% 10px, var(--paper-line) 0 1.3px, transparent 1.8px),
        radial-gradient(circle at 50% 36px, var(--paper-line) 0 1.3px, transparent 1.8px),
        radial-gradient(circle at 50% 62px, var(--paper-line) 0 1.3px, transparent 1.8px),
        linear-gradient(var(--paper-line), var(--paper-line));
      background-size:
        18px 26px,
        18px 26px,
        18px 26px,
        1px calc(100% - 24px);
      background-repeat: repeat-y, repeat-y, repeat-y, no-repeat;
      background-position: center 0, center 8px, center 16px, center 12px;
    }

    .paper-ornament-right {
      right: 10px;
      background:
        radial-gradient(circle at 50% 10px, var(--paper-line) 0 1.3px, transparent 1.8px),
        radial-gradient(circle at 50% 36px, var(--paper-line) 0 1.3px, transparent 1.8px),
        radial-gradient(circle at 50% 62px, var(--paper-line) 0 1.3px, transparent 1.8px),
        linear-gradient(var(--paper-line), var(--paper-line));
      background-size:
        18px 26px,
        18px 26px,
        18px 26px,
        1px calc(100% - 24px);
      background-repeat: repeat-y, repeat-y, repeat-y, no-repeat;
      background-position: center 0, center 8px, center 16px, center 12px;
    }

    .letter-inner {
      position: relative;
      z-index: 1;
      padding: 30px 28px 22px;
      opacity: 0;
      transition: opacity 0.5s ease;
      cursor: default;
    }

    .page.open .letter-inner {
      opacity: 1;
      transition-delay: 0.52s;
    }

    .title {
      margin: 0 0 10px;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(27px, 4vw, 34px);
      line-height: 1.2;
      color: #8f5b62;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 22px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(95, 70, 64, 0.62);
    }

    .message {
      font-size: 17px;
      line-height: 1.95;
      color: var(--ink);
      min-height: 215px;
    }

    .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(8px);
      animation: wordFade 0.42s forwards;
      margin-right: 0.28em;
    }

    @keyframes wordFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .signature {
      margin-top: 20px;
      text-align: right;
      font-size: 15px;
      color: var(--ink-soft);
      line-height: 1.5;
    }

    .boxes {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .box {
      border: none;
      border-radius: 16px;
      padding: 15px 16px;
      text-align: left;
      cursor: pointer;
      color: var(--ink);
      font: inherit;
      box-shadow: 0 10px 20px rgba(100, 72, 72, 0.07);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .box:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(100, 72, 72, 0.10);
    }

    .box-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .box-hint {
      font-size: 12px;
      color: rgba(95, 70, 64, 0.65);
    }

    .box-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      margin-top: 0;
      transition:
        max-height 0.35s ease,
        opacity 0.35s ease,
        margin-top 0.35s ease;
      font-size: 14px;
      line-height: 1.7;
    }

    .box.open .box-content {
      max-height: 160px;
      opacity: 1;
      margin-top: 10px;
    }

    .reason {
      background: var(--reason);
    }

    .ps {
      background: var(--ps);
    }

    .close-tab {
      margin: 18px auto 0;
      width: fit-content;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(173, 138, 126, 0.18);
      background: rgba(255, 248, 242, 0.95);
      color: rgba(95, 70, 64, 0.8);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(96, 67, 67, 0.06);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .close-tab:hover {
      transform: translateY(-1px);
      background: rgba(255, 251, 247, 1);
    }

    .floating-heart {
      position: fixed;
      bottom: -18px;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 1;
      color: rgba(255, 255, 255, 0.72);
      text-shadow: 0 2px 10px rgba(255,255,255,0.18);
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      from {
        transform: translateX(-50%) translateY(0) scale(1);
        opacity: 0.75;
      }
      to {
        transform: translateX(-50%) translateY(-115vh) scale(1.25);
        opacity: 0;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding-top: 24px;
        padding-bottom: 72px;
      }

      .page.open {
        padding-top: 32px;
        padding-bottom: 200px;
      }

      .envelope-wrapper {
        height: 290px;
      }

      .page.open .envelope-wrapper {
        height: 1060px;
      }

      .envelope {
        height: 245px;
      }

      .seal {
        width: 56px;
        height: 56px;
      }

      .seal::before,
      .seal::after {
        width: 15px;
        height: 24px;
        top: 15px;
      }

      .seal::before {
        left: 17px;
      }

      .seal::after {
        left: 24px;
      }

      .letter {
        width: 90%;
        min-height: 560px;
      }

      .letter-inner {
        padding: 28px 22px 20px;
      }

      .message {
        font-size: 16px;
        line-height: 1.9;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="page">
    <div class="scene">
      <div class="envelope-wrapper" id="envelopeWrapper">
        <div class="hint">tap the envelope 💌</div>

        <div class="letter" id="letter">
          <div class="paper-overlay"></div>
          <div class="paper-ornament-left"></div>
          <div class="paper-ornament-right"></div>

          <div class="letter-inner" id="letterInner">
            <h1 class="title">Two Months With You</h1>
            <div class="subtitle">a little note for my favorite person</div>

            <div class="message" id="message"></div>

            <div class="signature">
              Love,<br />
              your boyfriend :)
            </div>

            <div class="boxes">
              <button class="box reason" type="button">
                <div class="box-title">A reason I like you</div>
                <div class="box-hint">tap to open</div>
                <div class="box-content">
                  I like how delicate and lovely you are. I like the way light reflects off of your beautiful eyes, while you smile right at me. It makes me feel, at home... Thank you, I love you.
                
                </div>
              </button>

              <button class="box ps" type="button">
                <div class="box-title">P.S.</div>
                <div class="box-hint">tap to open</div>
                <div class="box-content">
                  Ando todo mariquito, nose que coño es lo que me pasa!! 
                </div>
              </button>
            </div>

            <button class="close-tab" id="closeTab" type="button">
              tuck letter back in
            </button>
          </div>
        </div>

        <div class="envelope" id="envelope">
          <div class="envelope-back"></div>
          <div class="flap"></div>
          <div class="seal"></div>
          <div class="envelope-front"></div>
          <div class="envelope-bottom"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const page = document.getElementById("page");
    const envelope = document.getElementById("envelope");
    const letter = document.getElementById("letter");
    const letterInner = document.getElementById("letterInner");
    const message = document.getElementById("message");
    const closeTab = document.getElementById("closeTab");
    const boxes = document.querySelectorAll(".box");

    const fullMessage = `
     My princess, these two months with you have felt gentle and golden,
    like something quiet and beautiful I never want to rush.

    There is a sweetness in you that is deep, and a softness that makes
    everything around you feel warmer. You have a way about you,
    graceful, bright, and full of life.
    
    When I think of you, I think of kindness, of light, and of a beauty
    that goes far beyond what the eye first sees. And somehow, I have
    the honor of calling you mine… mi florecita delicadita. I am so greatful
    to God for having you.
    
    I wanted to make you something personal, because you deserve something
    thoughtful, and because these days with you have truly meant a lot to me.
    `;

    let isOpen = false;
    let hasTyped = false;
    let heartInterval = null;

    let pointerDownY = 0;
    let pointerDownX = 0;
    let pointerMoved = false;

    function typeWords(text, element) {
      const words = text.trim().split(/\s+/);
      element.innerHTML = "";

      words.forEach((word, index) => {
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = word;
        span.style.animationDelay = `${index * 0.08}s`;
        element.appendChild(span);
      });
    }

    function createFloatingHeart() {
      const heart = document.createElement("div");
      const symbols = ["♥", "♡", "♥"];
      heart.className = "floating-heart";
      heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];

      const centerStart = window.innerWidth * 0.5;
      const spread = Math.min(window.innerWidth * 0.22, 120);
      const offset = (Math.random() - 0.5) * spread * 2;

      heart.style.left = `${centerStart + offset}px`;
      heart.style.fontSize = 16 + Math.random() * 14 + "px";
      heart.style.animationDuration = 4.5 + Math.random() * 2.2 + "s";
      heart.style.opacity = 0.5 + Math.random() * 0.25;

      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 7000);
    }

    function startHearts() {
      clearInterval(heartInterval);
      heartInterval = setInterval(createFloatingHeart, 550);
      setTimeout(() => clearInterval(heartInterval), 6500);
    }

    function openLetter() {
      if (isOpen) return;
      isOpen = true;
      page.classList.add("open");

      if (!hasTyped) {
        setTimeout(() => {
          typeWords(fullMessage, message);
          hasTyped = true;
        }, 720);
      }

      startHearts();

      setTimeout(() => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, 250);
    }

    function closeLetter() {
      if (!isOpen) return;
      isOpen = false;
      page.classList.remove("open");
      clearInterval(heartInterval);

      boxes.forEach((box) => box.classList.remove("open"));

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    envelope.addEventListener("click", openLetter);

    closeTab.addEventListener("click", (e) => {
      e.stopPropagation();
      closeLetter();
    });

    boxes.forEach((box) => {
      box.addEventListener("click", (e) => {
        e.stopPropagation();
        box.classList.toggle("open");
      });
    });

    letter.addEventListener("pointerdown", (e) => {
      if (!isOpen) return;
      pointerDownY = e.clientY;
      pointerDownX = e.clientX;
      pointerMoved = false;
    });

    letter.addEventListener("pointermove", (e) => {
      if (!isOpen) return;
      const dx = Math.abs(e.clientX - pointerDownX);
      const dy = Math.abs(e.clientY - pointerDownY);

      if (dx > 8 || dy > 8) {
        pointerMoved = true;
      }
    });

    letter.addEventListener("click", (e) => {
      if (!isOpen) return;

      const clickedInteractive = e.target.closest(".box, .close-tab");
      if (clickedInteractive) return;
      if (pointerMoved) return;

      closeLetter();
    });

    letterInner.addEventListener("click", (e) => {
      const clickedInteractive = e.target.closest(".box, .close-tab");
      if (clickedInteractive) return;
    });
  </script>
</body>
</html>
